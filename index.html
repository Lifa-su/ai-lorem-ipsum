<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Lorem Ipsum Generator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f13;--surface:#1a1a24;--surface2:#24243a;--border:#2e2e4a;--text:#e4e4f0;--text2:#9999b3;--accent:#7c5cfc;--accent2:#a78bfa;--accent-glow:rgba(124,92,252,.15);--success:#34d399;--radius:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
a{color:var(--accent2);text-decoration:none}
.container{max-width:960px;margin:0 auto;padding:0 20px;width:100%}
header{padding:32px 0 24px;text-align:center}
header h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
header p{color:var(--text2);font-size:.95rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px}
.card-title{font-size:1.05rem;font-weight:600;margin-bottom:16px;color:var(--accent2)}
.row{display:flex;gap:16px;flex-wrap:wrap}
.col{flex:1;min-width:200px}
label{display:block;font-size:.85rem;color:var(--text2);margin-bottom:6px;font-weight:500}
select,input[type=number]{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;outline:none;transition:border .2s}
select:focus,input[type=number]:focus{border-color:var(--accent)}
select option{background:var(--surface2);color:var(--text)}
.style-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:0}
.style-btn{padding:12px 16px;background:var(--surface2);border:2px solid var(--border);border-radius:10px;color:var(--text);font-size:.85rem;cursor:pointer;transition:all .2s;text-align:center;font-weight:500}
.style-btn:hover{border-color:var(--accent);background:var(--accent-glow)}
.style-btn.active{border-color:var(--accent);background:var(--accent-glow);color:var(--accent2)}
.style-btn .icon{font-size:1.3rem;display:block;margin-bottom:4px}
.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.btn{padding:12px 28px;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:linear-gradient(135deg,var(--accent),#6344e0);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(124,92,252,.4)}
.btn-copy{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.btn-copy:hover{border-color:var(--accent);background:var(--accent-glow)}
.btn-copy.copied{background:rgba(52,211,153,.15);border-color:var(--success);color:var(--success)}
.preview-area{position:relative}
.preview-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.preview-tabs{display:flex;gap:4px}
.preview-tab{padding:6px 16px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:.8rem;cursor:pointer;transition:all .2s}
.preview-tab.active{background:var(--accent-glow);border-color:var(--accent);color:var(--accent2)}
.output{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:20px;min-height:200px;max-height:500px;overflow-y:auto;font-size:.9rem;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.output::-webkit-scrollbar{width:6px}
.output::-webkit-scrollbar-track{background:transparent}
.output::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.output p,.output div,.output li{margin-bottom:8px}
.output.html-view code{color:var(--accent2)}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--success);color:#000;padding:12px 24px;border-radius:8px;font-weight:600;font-size:.9rem;transition:transform .3s ease;z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.stats{display:flex;gap:20px;margin-top:12px;flex-wrap:wrap}
.stat{font-size:.8rem;color:var(--text2)}
.stat span{color:var(--accent2);font-weight:600}
footer{margin-top:auto;padding:24px 0;text-align:center;color:var(--text2);font-size:.8rem;border-top:1px solid var(--border)}
@media(max-width:600px){
header h1{font-size:1.5rem}
.card{padding:16px}
.row{flex-direction:column;gap:12px}
.col{min-width:100%}
.style-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
.actions{flex-direction:column}
.btn{width:100%;justify-content:center}
.stats{flex-direction:column;gap:6px}
}
</style>
</head>
<body>
<header>
<div class="container">
<h1>✦ AI Lorem Ipsum</h1>
<p>Generate placeholder text in multiple styles — fast, flexible, and beautiful.</p>
</div>
</header>
<main class="container">
<div class="card">
<div class="card-title">Text Style</div>
<div class="style-grid" id="styleGrid">
<button class="style-btn active" data-style="classic"><span class="icon">📜</span>Classic Latin</button>
<button class="style-btn" data-style="business"><span class="icon">💼</span>Business</button>
<button class="style-btn" data-style="tech"><span class="icon">🚀</span>Tech</button>
<button class="style-btn" data-style="humor"><span class="icon">😂</span>Humor</button>
<button class="style-btn" data-style="chinese"><span class="icon">🀄</span>中文</button>
</div>
</div>
<div class="card">
<div class="card-title">Generation Options</div>
<div class="row">
<div class="col">
<label for="genType">Generate By</label>
<select id="genType">
<option value="paragraphs">Paragraphs</option>
<option value="sentences">Sentences</option>
<option value="words">Words</option>
</select>
</div>
<div class="col">
<label for="genCount">Count</label>
<input type="number" id="genCount" value="3" min="1" max="999">
</div>
<div class="col">
<label for="wrapTag">HTML Wrap</label>
<select id="wrapTag">
<option value="none">Plain Text</option>
<option value="p">&lt;p&gt; tags</option>
<option value="div">&lt;div&gt; tags</option>
<option value="li">&lt;li&gt; tags</option>
</select>
</div>
</div>
<div class="actions">
<button class="btn btn-primary" id="generateBtn">⚡ Generate</button>
<button class="btn btn-copy" id="copyBtn">📋 Copy to Clipboard</button>
</div>
</div>
<div class="card preview-area">
<div class="preview-header">
<div class="card-title" style="margin-bottom:0">Preview</div>
<div class="preview-tabs">
<button class="preview-tab active" data-view="rendered">Rendered</button>
<button class="preview-tab" data-view="source">Source</button>
</div>
</div>
<div class="output" id="output">Click <strong>Generate</strong> to create placeholder text...</div>
<div class="stats" id="stats"></div>
</div>
</main>
<footer>
<div class="container">AI Lorem Ipsum Generator &copy; 2025 &mdash; Generate beautiful placeholder text instantly.</div>
</footer>
<div class="toast" id="toast">✓ Copied to clipboard!</div>

let currentStyle='classic';
let currentView='rendered';
let generatedText='';
let generatedHTML='';

const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);

// Style buttons
$('#styleGrid').addEventListener('click',e=>{
  const btn=e.target.closest('.style-btn');
  if(!btn)return;
  $$('.style-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentStyle=btn.dataset.style;
});

// Preview tabs
$$('.preview-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    $$('.preview-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentView=tab.dataset.view;
    renderOutput();
  });
});

// Generate
$('#generateBtn').addEventListener('click',generate);

// Copy
$('#copyBtn').addEventListener('click',()=>{
  if(!generatedText)return;
  const textToCopy=currentView==='source'&&generatedHTML?generatedHTML:generatedText;
  navigator.clipboard.writeText(textToCopy).then(()=>{
    const btn=$('#copyBtn');
    btn.classList.add('copied');
    btn.innerHTML='✓ Copied!';
    showToast();
    setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='📋 Copy to Clipboard';},2000);
  });
});

function getSentences(style){
  const paragraphs=DATA[style];
  const sentences=[];
  paragraphs.forEach(p=>{
    // Split by sentence-ending punctuation
    const parts=p.match(/[^.!?。！？]+[.!?。！？]+/g)||[p];
    parts.forEach(s=>{
      const trimmed=s.trim();
      if(trimmed)sentences.push(trimmed);
    });
  });
  return sentences;
}

function getWords(style){
  const paragraphs=DATA[style];
  const words=[];
  paragraphs.forEach(p=>{
    if(style==='chinese'){
      // For Chinese, split into chunks of 2-4 characters as "words"
      const chars=p.replace(/[，。！？、；：""''（）\s]/g,'');
      for(let i=0;i<chars.length;i+=2){
        words.push(chars.substring(i,Math.min(i+2,chars.length)));
      }
    }else{
      p.split(/\s+/).forEach(w=>{
        const clean=w.replace(/[.,;:!?]$/,'');
        if(clean)words.push(clean);
      });
    }
  });
  return words;
}

function generate(){
  const type=$('#genType').value;
  let count=parseInt($('#genCount').value)||1;
  count=Math.max(1,Math.min(999,count));
  const wrap=$('#wrapTag').value;
  const style=currentStyle;
  const paragraphs=DATA[style];

  let blocks=[];

  if(type==='paragraphs'){
    for(let i=0;i<count;i++){
      blocks.push(paragraphs[i%paragraphs.length]);
    }
  }else if(type==='sentences'){
    const allSentences=getSentences(style);
    let collected=[];
    for(let i=0;i<count;i++){
      collected.push(allSentences[i%allSentences.length]);
    }
    // Group into paragraphs of ~4 sentences
    const perPara=Math.max(1,Math.min(4,Math.ceil(count/3)));
    for(let i=0;i<collected.length;i+=perPara){
      blocks.push(collected.slice(i,i+perPara).join(' '));
    }
  }else if(type==='words'){
    const allWords=getWords(style);
    let collected=[];
    for(let i=0;i<count;i++){
      collected.push(allWords[i%allWords.length]);
    }
    const sep=style==='chinese'?'':'  ';
    // Group into paragraphs of ~30 words
    const perPara=style==='chinese'?20:30;
    for(let i=0;i<collected.length;i+=perPara){
      blocks.push(collected.slice(i,i+perPara).join(sep));
    }
  }

  // Build output
  if(wrap==='none'){
    generatedText=blocks.join('\n\n');
    generatedHTML=generatedText;
  }else{
    const tag=wrap;
    if(tag==='li'){
      generatedHTML='<ul>\n'+blocks.map(b=>'  <li>'+b+'</li>').join('\n')+'\n</ul>';
    }else{
      generatedHTML=blocks.map(b=>'<'+tag+'>'+b+'</'+tag+'>').join('\n');
    }
    generatedText=generatedHTML;
  }

  // Stats
  const plainText=blocks.join(' ');
  const wordCount=style==='chinese'?plainText.replace(/\s/g,'').length:plainText.split(/\s+/).filter(Boolean).length;
  const charCount=plainText.length;
  const paraCount=blocks.length;
  $('#stats').innerHTML=`
    <div class="stat">Paragraphs: <span>${paraCount}</span></div>
    <div class="stat">${style==='chinese'?'Characters':'Words'}: <span>${wordCount}</span></div>
    <div class="stat">Characters: <span>${charCount}</span></div>
  `;

  renderOutput();
}

function renderOutput(){
  const out=$('#output');
  if(!generatedText){
    out.innerHTML='Click <strong>Generate</strong> to create placeholder text...';
    return;
  }
  if(currentView==='source'){
    out.textContent=generatedText;
    out.classList.add('html-view');
  }else{
    const wrap=$('#wrapTag').value;
    if(wrap==='none'){
      out.innerHTML=generatedText.split('\n\n').map(p=>'<p>'+p+'</p>').join('');
    }else{
      out.innerHTML=generatedHTML;
    }
    out.classList.remove('html-view');
  }
}

function showToast(){
  const t=$('#toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// Auto-generate on load
generate();
</script>
