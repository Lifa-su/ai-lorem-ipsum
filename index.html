<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Lorem Ipsum Generator</title>
<meta name="description" content="Generate creative Lorem Ipsum text in multiple styles: Classic Latin, Hipster, Tech, Pirate, and Zombie.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;--accent:#e94560;--accent2:#533483;--text:#eee;--text2:#aab;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,.3)}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center}
.container{max-width:860px;width:100%;padding:20px}
header{text-align:center;padding:40px 0 30px;animation:fadeDown .6s ease}
h1{font-size:2.4rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
header p{color:var(--text2);font-size:1.05rem}
.controls{background:var(--bg2);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:24px;animation:fadeUp .6s ease}
.row{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.field{flex:1;min-width:180px}
.field label{display:block;font-size:.85rem;color:var(--text2);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
select,input[type=number]{width:100%;padding:10px 14px;background:var(--bg);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text);font-size:.95rem;transition:border .2s}
select:focus,input:focus{outline:none;border-color:var(--accent)}
select option{background:var(--bg)}
.styles-grid{display:flex;gap:8px;flex-wrap:wrap}
.style-btn{padding:8px 16px;border-radius:20px;border:2px solid rgba(255,255,255,.1);background:transparent;color:var(--text2);cursor:pointer;font-size:.85rem;transition:all .25s}
.style-btn:hover{border-color:var(--accent);color:var(--text)}
.style-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;transform:scale(1.05)}
.generate-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#fff;font-size:1.1rem;font-weight:600;cursor:pointer;transition:transform .2s,box-shadow .2s;margin-top:8px}
.generate-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(233,69,96,.4)}
.generate-btn:active{transform:translateY(0)}
.output-wrap{background:var(--bg2);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;animation:fadeUp .6s ease .1s both}
.output-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.06)}
.output-header h3{font-size:.95rem;color:var(--text2)}
.copy-btn{padding:8px 20px;background:var(--bg3);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text);cursor:pointer;font-size:.85rem;transition:all .25s;display:flex;align-items:center;gap:6px}
.copy-btn:hover{background:var(--accent);border-color:var(--accent)}
.copy-btn.copied{background:#2ecc71;border-color:#2ecc71}
#output{padding:20px;min-height:200px;line-height:1.8;font-size:.95rem;color:var(--text2);white-space:pre-wrap;word-wrap:break-word;max-height:500px;overflow-y:auto}
#output::-webkit-scrollbar{width:6px}
#output::-webkit-scrollbar-track{background:transparent}
#output::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
.toast{position:fixed;top:20px;right:20px;padding:12px 24px;background:#2ecc71;color:#fff;border-radius:8px;font-weight:600;transform:translateX(120%);transition:transform .3s ease;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.toast.show{transform:translateX(0)}
footer{text-align:center;padding:30px 0;color:var(--text2);font-size:.8rem}
footer a{color:var(--accent);text-decoration:none}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){
  h1{font-size:1.8rem}
  .container{padding:12px}
  .controls{padding:16px}
  .row{gap:10px}
  .field{min-width:140px}
  #output{font-size:.88rem;max-height:350px}
}
</style>
</head>

</div>

<option value="list">List Items</option>

</div>
<div class="field">
<label>Count (1-50)</label>

</div>
<button class="generate-btn" onclick="generate()">Generate Text</button>
</div>
<div class="output-wrap">
<div class="output-header">
<h3>Generated Text</h3>
<button class="copy-btn" onclick="copyText()"><span>&#x1F4CB;</span> Copy</button>

<div id="output">Click "Generate Text" to create your lorem ipsum...</div>
</div>

<p>AI Lorem Ipsum Generator &mdash; Built with &#x2764;&#xFE0F; | <a href="https://github.com/Lifa-su/ai-lorem-ipsum" target="_blank">GitHub</a></p>
</footer>
</div>

const STYLES=Object.keys(DATA);
let currentStyle='classic';

function init(){
const grid=document.getElementById('styleGrid');
STYLES.forEach(s=>{
const btn=document.createElement('button');
btn.className='style-btn'+(s===currentStyle?' active':'');
btn.textContent=DATA[s].name;
btn.onclick=()=>{
document.querySelectorAll('.style-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
currentStyle=s;
};
grid.appendChild(btn);
});
generate();
}

function shuffle(arr){
const a=[...arr];
for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
return a;
}

function pick(arr,n){
let result=[];
while(result.length<n){result.push(...shuffle(arr));}
return result.slice(0,n);
}

function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1);}

function genSentence(style){
const d=DATA[style];
if(Math.random()<0.5&&d.sentences.length>0){
return d.sentences[Math.floor(Math.random()*d.sentences.length)];
}
const len=8+Math.floor(Math.random()*12);
const words=pick(d.words,len);
return capitalize(words.join(' '))+'.';
}

function genParagraph(style){
const count=4+Math.floor(Math.random()*4);
return Array.from({length:count},()=>genSentence(style)).join(' ');
}

function generate(){
const type=document.getElementById('typeSelect').value;
let count=parseInt(document.getElementById('countInput').value)||3;
count=Math.max(1,Math.min(50,count));
document.getElementById('countInput').value=count;
const style=currentStyle;
let result='';
switch(type){
case'paragraphs':
result=Array.from({length:count},()=>genParagraph(style)).join('\n\n');
break;
case'sentences':
result=Array.from({length:count},()=>genSentence(style)).join(' ');
break;
case'words':
result=pick(DATA[style].words,count).join(' ');
break;
case'list':
result=Array.from({length:count},(_,i)=>(i+1)+'. '+genSentence(style)).join('\n');
break;
}
const el=document.getElementById('output');
el.style.opacity='0';
setTimeout(()=>{el.textContent=result;el.style.opacity='1';el.style.transition='opacity .3s';},150);
}

function copyText(){
const text=document.getElementById('output').textContent;
navigator.clipboard.writeText(text).then(()=>{
const btn=document.querySelector('.copy-btn');
btn.classList.add('copied');
btn.innerHTML='<span>&#x2705;</span> Copied!';
const toast=document.getElementById('toast');
toast.classList.add('show');
setTimeout(()=>{
toast.classList.remove('show');
btn.classList.remove('copied');
btn.innerHTML='<span>&#x1F4CB;</span> Copy';
},2000);
});
}

init();
</script>
